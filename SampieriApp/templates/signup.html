{% extends 'base.html' %}

{% load static %}

{% block content %}

<section id="signin" class="row flexbox-container">
    <div class="col-xl-8 col-11">
        <div class="card bg-authentication mb-0">
            <div class="row m-0">
                <div class="col-md-6 col-12 px-0">
                    <div class="card disable-rounded-right mb-0 p-2 h-100 d-flex justify-content-center">
                        <div class="card-header pb-1">
                            <div class="card-title">
                                <h4 class="text-center mb-2">Registrarse</h4>
                            </div>
                        </div>
                        <div class="card-content">
                            <div class="card-body">
                                <form id="loginform">
                                    {% csrf_token %}
                                    <div class="form-group mb-50">
                                        <label class="text-bold-600" for="usuario">{{userForm.username.label}}</label>
                                        {{userForm.username}}
                                    </div>
                                    <div class="form-group mb-50">
                                        <label class="text-bold-600" for="usuario">{{userForm.first_name.label}}</label>
                                        {{userForm.first_name}}
                                    </div>
                                    <div class="form-group mb-50">
                                        <label class="text-bold-600" for="usuario">{{userForm.last_name.label}}</label>
                                        {{userForm.last_name}}
                                    </div>
                                    <div class="form-group mb-50">
                                        <label class="text-bold-600" for="usuario">{{userForm.email.label}}</label>
                                        {{userForm.email}}
                                    </div>
                                    <div class="form-group">
                                        <label class="text-bold-600" for="contrasenia">{{userForm.password.label}}</label>
                                        {{userForm.password}}
                                    </div>
                                    <div class="form-group">
                                        <label class="text-bold-600" for="contrasenia">Confirmar contrase&ntilde;a</label>
                                        <input type="password" class="form-control" id="confirmacionContrasenia" name="confirmacionContrasenia"
                                            placeholder="Contrase&ntilde;a">
                                    </div>
                                    <a id="btn-registrar" class="btn btn-primary glow w-100 position-relative" href="#" >Registrarse<i
                                            id="icon-arrow" class="bx bx-right-arrow-alt"></i></a>
                                    <p></p><a href="/" class="btn btn-primary glow w-100 position-relative" class="bx bx-right-arrow-alt">Volver</a>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 d-md-block d-none text-center align-self-center p-3">
                    <div class="card-content">
                        <img class="img-fluid" src="{% static 'app-assets/images/pages/login.png' %}"
                            alt="branding logo">
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<script>
    $(document).ready(function() {
        Login.init();
    });
</script>

{% endblock %}
