{% extends 'base.html' %}

{% load static %}

{% block content %}

<body
    class="vertical-layout vertical-menu-modern semi-dark-layout 1-column  navbar-sticky footer-static bg-full-screen-image  blank-page blank-page"
    data-open="click" data-menu="vertical-menu-modern" data-col="1-column" data-layout="dark-layout">
    <div class="app-content content">
        <div class="content-overlay"></div>
        <div class="content-wrapper">
            <div class="content-header row">
            </div>
            <div class="content-body">
                <section id="auth-login" class="row flexbox-container">
                    <div class="col-xl-8 col-11">
                        <div class="card bg-authentication mb-0">
                            <div class="row m-0">
                                <div class="col-md-6 col-12 px-0">
                                    <div
                                        class="card disable-rounded-right mb-0 p-2 h-100 d-flex justify-content-center">
                                        <div class="card-header pb-1">
                                            <div class="card-title">
                                                <h4 class="text-center mb-2">Bienvenido</h4>
                                            </div>
                                        </div>
                                        <div class="card-content">
                                            <div class="card-body">
                                                <form id="loginform">
                                                    {% csrf_token %}
                                                    <div class="form-group mb-50">
                                                        <label class="text-bold-600"
                                                            for="usuario">{{userForm.username.label}}</label>
                                                        {{userForm.username}}
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="text-bold-600"
                                                            for="contrasenia">{{userForm.password.label}}</label>
                                                        {{userForm.password}}
                                                    </div>
                                                    <a href="" class="position-right" style="float: right;">Recuperar
                                                        contraseña</a>
                                                    <br></br>
                                                    <a id="btn-iniciar" style="color: white;"
                                                        class="btn btn-primary glow w-100 position-relative">Login<i
                                                            id="icon-arrow" class="bx bx-right-arrow-alt"></i></a>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6 d-md-block d-none text-center align-self-center p-3">
                                    <div class="card-content">
                                        <img class="img-fluid" src="{% static 'app-assets/images/pages/login.png' %}"
                                            alt="branding logo">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
</body>
<script>
    $(document).ready(function () {
        Login.init();
    });
</script>

{% endblock %}
